<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Tracker (Persistent)</title>
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    .category { margin-top: 30px; }
    .category h2 { background-color: #f4f4f4; padding: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #eee; }
    select, input[type=text], button { padding: 5px; margin-right: 5px; }
    button.deleteBtn { background-color: #ff4d4d; color: white; border: none; cursor: pointer; }
    button.deleteBtn:hover { background-color: #cc0000; }
</style>
</head>
<body>

<h1>Job Tracker (Persistent)</h1>

<div>
    <input type="text" id="jobName" placeholder="Enter job name">
    <select id="jobStatus">
        <option value="Before Pics">Before Pics</option>
        <option value="Quote">Quote</option>
        <option value="Approval Needed">Approval Needed</option>
        <option value="Completion Pics & Sign Off">Completion Pics & Sign Off</option>
        <option value="Billing">Billing</option>
    </select>
    <button onclick="addJob()">Add Job</button>
</div>

<!-- Category Sections -->
<div class="category" id="Before Pics"><h2>Before Pics</h2><table><thead><tr><th>Job Name</th><th>Change Status</th><th>Delete</th></tr></thead><tbody></tbody></table></div>
<div class="category" id="Quote"><h2>Quote</h2><table><thead><tr><th>Job Name</th><th>Change Status</th><th>Delete</th></tr></thead><tbody></tbody></table></div>
<div class="category" id="Approval Needed"><h2>Approval Needed</h2><table><thead><tr><th>Job Name</th><th>Change Status</th><th>Delete</th></tr></thead><tbody></tbody></table></div>
<div class="category" id="Completion Pics & Sign Off"><h2>Completion Pics & Sign Off</h2><table><thead><tr><th>Job Name</th><th>Change Status</th><th>Delete</th></tr></thead><tbody></tbody></table></div>
<div class="category" id="Billing"><h2>Billing</h2><table><thead><tr><th>Job Name</th><th>Change Status</th><th>Delete</th></tr></thead><tbody></tbody></table></div>

<script>
const categories = ["Before Pics", "Quote", "Approval Needed", "Completion Pics & Sign Off", "Billing"];

// Load saved jobs from localStorage
window.onload = () => {
    const savedJobs = JSON.parse(localStorage.getItem('jobs')) || [];
    savedJobs.forEach(job => createJobRow(job.name, job.status));
};

// Save all jobs to localStorage
function saveJobs() {
    const allJobs = [];
    categories.forEach(cat => {
        document.querySelectorAll(`#${CSS.escape(cat)} tbody tr`).forEach(row => {
            allJobs.push({
                name: row.cells[0].textContent,
                status: row.cells[1].textContent
            });
        });
    });
    localStorage.setItem('jobs', JSON.stringify(allJobs));
}

// Create a single job row
function createJobRow(jobName, jobStatus) {
    const tableBody = document.querySelector(`#${CSS.escape(jobStatus)} tbody`);
    const row = document.createElement('tr');

    const nameCell = document.createElement('td');
    nameCell.textContent = jobName;

    const actionCell = document.createElement('td');
    const statusDropdown = document.createElement('select');
    categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        if (cat === jobStatus) option.selected = true;
        statusDropdown.appendChild(option);
    });

    statusDropdown.addEventListener('change', function() {
        row.remove();
        document.querySelector(`#${CSS.escape(this.value)} tbody`).appendChild(row);
        saveJobs();
    });

    actionCell.appendChild(statusDropdown);

    const deleteCell = document.createElement('td');
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "deleteBtn";
    deleteBtn.addEventListener('click', () => {
        row.remove();
        saveJobs();
    });
    deleteCell.appendChild(deleteBtn);

    row.appendChild(nameCell);
    row.appendChild(actionCell);
    row.appendChild(deleteCell);

    tableBody.appendChild(row);
    saveJobs();
}

// Add a new job
function addJob() {
    const nameInput = document.getElementById('jobName');
    const statusSelect = document.getElementById('jobStatus');
    const jobName = nameInput.value.trim();
    const jobStatus = statusSelect.value;

    if (!jobName) {
        alert("Please enter a job name.");
        return;
    }

    createJobRow(jobName, jobStatus);

    nameInput.value = '';
    statusSelect.value = "Before Pics";
}
</script>

</body>
</html>
